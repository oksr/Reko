name: Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build (unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @reko/app build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Build Rust (no bundle)
        run: cargo build --manifest-path apps/tauri/src-tauri/Cargo.toml

      - name: Run Rust tests
        run: cargo test --manifest-path apps/tauri/src-tauri/Cargo.toml

      - name: Run frontend tests
        run: pnpm --filter @reko/app test
