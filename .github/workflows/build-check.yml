name: Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build (unsigned)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @reko/app build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          shared-key: reko-rust
          save-always: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: RekoEngine/.build
          key: swift-${{ runner.os }}-${{ hashFiles('RekoEngine/Package.swift', 'RekoEngine/Sources/**') }}
          restore-keys: |
            swift-${{ runner.os }}-

      - name: Build Rust (no bundle)
        env:
          RUSTC_WRAPPER: sccache
        run: cargo build --manifest-path apps/tauri/src-tauri/Cargo.toml

      - name: Run Rust tests
        env:
          RUSTC_WRAPPER: sccache
        run: cargo test --manifest-path apps/tauri/src-tauri/Cargo.toml

      - name: Run frontend tests
        run: pnpm --filter @reko/app test
