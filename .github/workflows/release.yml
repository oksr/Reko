name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          shared-key: reko-rust
          save-if: true

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: RekoEngine/.build
          key: swift-${{ runner.os }}-${{ hashFiles('RekoEngine/Package.swift', 'RekoEngine/Sources/**') }}
          restore-keys: |
            swift-${{ runner.os }}-

      - name: Set version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          jq --arg v "$VERSION" '.version = $v' apps/tauri/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json apps/tauri/src-tauri/tauri.conf.json

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Create temporary keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set keychain as default
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" "$KEYCHAIN_PATH"

          # Diagnostic: show available identities
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build aarch64 binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm --filter @reko/tauri tauri:build --target aarch64-apple-darwin

      - name: Find bundle artifacts
        id: artifacts
        run: |
          BUNDLE_DIR=apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          TARGZ=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz" ! -name "*.sig" | head -1)
          SIG=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz.sig" | head -1)
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "targz=$TARGZ" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"
          echo "Found DMG: $DMG"
          echo "Found tar.gz: $TARGZ"
          echo "Found sig: $SIG"

      - name: Generate latest.json
        run: |
          VERSION=$(jq -r '.version' apps/tauri/src-tauri/tauri.conf.json)
          SIG=$(cat "${{ steps.artifacts.outputs.sig }}")
          TARGZ_NAME=$(basename "${{ steps.artifacts.outputs.targz }}")
          cat > latest.json <<ENDJSON
          {
            "version": "$VERSION",
            "notes": "Reko v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "$TARGZ_NAME"
              }
            }
          }
          ENDJSON
          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Reko ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.targz }}
            ${{ steps.artifacts.outputs.sig }}
            latest.json

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
