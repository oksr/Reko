name = "reko-api"
main = "src/index.ts"
compatibility_date = "2025-12-01"

[vars]
SHARE_BASE_URL = "https://share.reko.video"
R2_ACCOUNT_ID = ""  # Set via wrangler secret put or .dev.vars for local
ENVIRONMENT = "production"

# R2 bucket for video storage
[[r2_buckets]]
binding = "VIDEOS_BUCKET"
bucket_name = "reko-videos"

# D1 database for metadata, analytics, comments
[[d1_databases]]
binding = "DB"
database_name = "reko-db"
database_id = "placeholder-replace-after-creation"
